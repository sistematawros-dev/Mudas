<div class="header" id="app-header">
  <div class="header-top">
    <div class="header-left">
      <button class="header-menu-toggle" aria-label="Alternar menu">
        <img src="/assets/menu-icon.png" alt="Menu" width="24" height="24">
      </button>
      <div class="header-context">
        <h1 class="header-title" id="page-title">Painel</h1>
        <nav class="header-breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
      </div>
    </div>

    <!-- Right Section -->
    <div class="header-right">
      <!-- Filial -->
      <span id="header-filial-nome" class="header-filial-nome">Filial</span>

      <!-- Notifications -->
      <button class="header-icon-btn" aria-label="Notificações">
        <img src="/assets/notification-bell.png" alt="Notificações" width="18" height="18">
      </button>

      <!-- Troca de senha: visível apenas para usuários comuns (não admin/tawros) -->
      <div class="header-dropdown" id="header-user-wrapper" hidden>
        <button class="header-icon-btn" aria-label="Minha conta" id="header-user-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="header-user-modal" id="header-user-modal" hidden>
          <p class="header-user-modal__title">Alterar senha</p>
          <p class="header-user-modal__username" id="hum-username"></p>
          <div class="header-user-modal__fields">
            <label class="header-user-modal__label">
              Senha atual
              <input type="password" id="hum-current" class="header-user-modal__input" autocomplete="current-password" />
            </label>
            <label class="header-user-modal__label">
              Nova senha
              <input type="password" id="hum-new" class="header-user-modal__input" autocomplete="new-password" />
            </label>
            <label class="header-user-modal__label">
              Confirmar nova senha
              <input type="password" id="hum-confirm" class="header-user-modal__input" autocomplete="new-password" />
            </label>
          </div>
          <p class="header-user-modal__error" id="hum-error" hidden></p>
          <div class="header-user-modal__actions">
            <button type="button" class="header-user-modal__btn header-user-modal__btn--cancel" id="hum-cancel">Cancelar</button>
            <button type="button" class="header-user-modal__btn header-user-modal__btn--confirm" id="hum-confirm-btn">Confirmar</button>
          </div>
        </div>
      </div>

      <!-- Settings: oculto por padrão, revelado via JS apenas para admin/tawros -->
      <div class="header-dropdown header-dropdown--settings" id="header-settings-wrapper" hidden>
        <button class="header-icon-btn" aria-label="Configurações" id="header-settings-btn" aria-expanded="false" aria-haspopup="menu">
          <img src="/assets/settings-gear.png" alt="Configurações" width="18" height="18">
        </button>
        <div class="header-settings-menu" id="header-settings-menu" role="menu" hidden>
          <button type="button" class="header-settings-menu__item" role="menuitem" data-header-settings-action="filial">
            Filial
          </button>
          <button type="button" class="header-settings-menu__item" role="menuitem" data-header-settings-action="licencas-modulos">
            Licenças
          </button>
          <button type="button" class="header-settings-menu__item" role="menuitem" data-header-settings-action="usuarios-cadastro">
            Usuários
          </button>
          <button type="button" class="header-settings-menu__item" role="menuitem" data-header-settings-action="senha" id="header-settings-senha-item">
            Senha
          </button>
        </div>

        <!-- Modal alterar senha (admin) -->
        <div class="header-user-modal header-admin-senha-modal" id="header-admin-senha-modal" hidden>
          <p class="header-user-modal__title">Alterar senha</p>
          <div class="header-user-modal__fields">
            <label class="header-user-modal__label">
              Usuário
              <select id="hasm-user-select" class="header-user-modal__input header-user-modal__select">
                <option value="">Carregando...</option>
              </select>
            </label>
            <label class="header-user-modal__label">
              Nova senha
              <input type="password" id="hasm-new" class="header-user-modal__input" autocomplete="new-password" />
            </label>
            <label class="header-user-modal__label">
              Confirmar nova senha
              <input type="password" id="hasm-confirm" class="header-user-modal__input" autocomplete="new-password" />
            </label>
          </div>
          <p class="header-user-modal__error" id="hasm-error" hidden></p>
          <div class="header-user-modal__actions">
            <button type="button" class="header-user-modal__btn header-user-modal__btn--cancel" id="hasm-cancel">Cancelar</button>
            <button type="button" class="header-user-modal__btn header-user-modal__btn--confirm" id="hasm-confirm-btn">Confirmar</button>
          </div>
        </div>
      </div>

      <!-- Ajuda Dropdown -->
      <div class="header-dropdown">
        <button class="header-dropdown-btn">
          <span>Ajuda</span>
          <img src="/assets/help-icon.png" alt="" width="14" height="14">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <nav class="header-tabs" id="header-tabs" aria-label="Navegação de produção"></nav>
  <nav class="header-subtabs" id="header-subtabs" aria-label="Navegação secundária"></nav>
</div>
