<main class="cadastros-page">
  <section class="cadastros-header" id="cadastros-list-header">
    <h2 class="cadastros-title">Pessoas e Empresas</h2>
    <button type="button" class="btn btn--primary" id="cadastros-new-btn">Novo cadastro</button>
  </section>

  <section id="cadastro-pessoa-empresa-container" hidden></section>

  <section class="cadastros-table-card" id="cadastros-list-card">
    <section class="cadastros-filters">
      <div class="cadastros-search">
        <input id="cadastros-search-input" class="cadastros-search__input" type="text"
          placeholder="Buscar por: Razão Social, CNPJ, Cidade..." />
        <span class="cadastros-search__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
            <path d="M20 20L16.5 16.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </span>
      </div>

      <button type="button" class="btn btn--outline-dark cadastros-filters__advanced" id="cadastros-advanced-filters-btn">
        <span class="cadastros-filters__dot" aria-hidden="true"></span>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 5H21L14 13V19L10 21V13L3 5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        </svg>
        <span>Filtros avançados</span>
      </button>
    </section>

    <section class="cadastros-badges" id="cadastros-badges">
    </section>

    <div class="cadastros-table-wrap">
      <table class="cadastros-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>Grupo</th>
            <th>Tipo</th>
            <th class="is-sortable">CPF / CNPJ
              <span class="cadastros-sort" aria-hidden="true">
                <svg viewBox="0 0 10 6" fill="none">
                  <path d="M1 5L5 1L9 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
                <svg viewBox="0 0 10 6" fill="none">
                  <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </span>
            </th>
            <th class="is-sortable">Nome / Razão Social
              <span class="cadastros-sort" aria-hidden="true">
                <svg viewBox="0 0 10 6" fill="none">
                  <path d="M1 5L5 1L9 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
                <svg viewBox="0 0 10 6" fill="none">
                  <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </span>
            </th>
            <th>Apelido/Nome Fantasia</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <footer class="cadastros-table-footer">
      <div class="cadastros-table-footer__left">
        <button type="button" class="cadastros-entries-btn">10 Entradas
          <svg viewBox="0 0 12 8" fill="none">
            <path d="M2 2L6 6L10 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>
        <span class="cadastros-table-info">Mostrando 0 a 0 de 0 entradas.</span>
      </div>

      <nav class="cadastros-pagination" aria-label="Paginação">
        <button type="button" class="cadastros-pagination__btn" aria-label="Página anterior">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
        <button type="button" class="cadastros-pagination__number is-active">1</button>
        <button type="button" class="cadastros-pagination__btn" aria-label="Próxima página">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </nav>
    </footer>
  </section>
</main>
