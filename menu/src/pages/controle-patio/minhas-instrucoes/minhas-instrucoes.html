<main class="minhas-instrucoes-page">
  <div class="minhas-instrucoes">
    <section class="minhas-instrucoes__topbar" aria-label="Cabeçalho">
      <div class="minhas-instrucoes__title-wrap">
        <h1 class="minhas-instrucoes__title">Minhas Instruções</h1>
        <p class="minhas-instrucoes__subtitle" id="minhas-instrucoes-subtitle"></p>
      </div>
      <div class="minhas-instrucoes__actions">
        <div class="minhas-instrucoes__search-wrap">
          <div id="minhas-instrucoes-search"></div>
        </div>
      </div>
    </section>

    <section class="minhas-instrucoes__filters" id="minhas-instrucoes-filters" aria-label="Filtros"></section>

    <section class="minhas-instrucoes__content" aria-label="Listagem de instruções">
      <div class="minhas-instrucoes__table-wrap">
        <table class="minhas-instrucoes__table" aria-label="Minhas instruções agendadas">
          <thead>
            <tr>
              <th>ID</th>
              <th>Instrução</th>
              <th>Produto</th>
              <th>Produtor</th>
              <th>Data Agend.</th>
              <th>Motorista</th>
              <th>Placa</th>
              <th>Quantidade</th>
              <th>Carregado</th>
              <th>Aprovação</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="minhas-instrucoes-tbody">
            <tr class="minhas-instrucoes__loading-row">
              <td colspan="10">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="minhas-instrucoes__pagination" id="minhas-instrucoes-pagination"></div>
    </section>
  </div>
</main>
