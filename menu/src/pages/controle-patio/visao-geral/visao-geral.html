<main class="patio-overview-page">
  <div class="patio-overview">
    <section class="patio-overview__topbar" aria-label="Cabeçalho da visão geral">
      <div class="patio-overview__title-wrap">
        <h1 class="patio-overview__title">Visão Geral</h1>
      </div>

      <button type="button" class="patio-overview__today-btn" data-action="today">
        <span class="patio-overview__today-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M8 3V6M16 3V6M4 9H20M6 5H18C19.1046 5 20 5.89543 20 7V19C20 20.1046 19.1046 21 18 21H6C4.89543 21 4 20.1046 4 19V7C4 5.89543 4.89543 5 6 5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span>Hoje</span>
      </button>
    </section>

    <section class="patio-overview__metrics" id="patio-overview-metrics" aria-label="Indicadores de pátio"></section>

    <section class="patio-overview__content">
      <article class="patio-panel patio-panel--appointments" aria-labelledby="patio-appointments-title">
        <header class="patio-panel__header">
          <div class="patio-panel__title-wrap">
            <span class="patio-panel__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 7H15C16.1046 7 17 7.89543 17 9V17C17 18.1046 16.1046 19 15 19H3V7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M17 10H21V17C21 18.1046 20.1046 19 19 19H17V10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="8.5" cy="13" r="2.5" stroke="currentColor" stroke-width="2"/>
              </svg>
            </span>
            <h2 id="patio-appointments-title" class="patio-panel__title">Próximos Agendamentos</h2>
          </div>

          <button type="button" class="patio-panel__action" data-action="view-all">Ver todos</button>
        </header>

        <div class="patio-appointments-list" id="patio-appointments-list"></div>
      </article>

      <aside class="patio-panel patio-panel--status" aria-labelledby="patio-status-title">
        <header class="patio-panel__header patio-panel__header--stacked">
          <div class="patio-panel__title-wrap">
            <span class="patio-panel__icon patio-panel__icon--status" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 16L9 11L13 15L20 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 8H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <h2 id="patio-status-title" class="patio-panel__title">Status das Instruções</h2>
          </div>
        </header>

        <div class="patio-status-chart" id="patio-status-chart" aria-label="Gráfico de status das instruções"></div>
        <div class="patio-status-legend" id="patio-status-legend"></div>
      </aside>
    </section>
  </div>
</main>
